<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RBT Scheduler – Weekly Dashboard</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface:  '#1e2030',
            panel:    '#252839',
            border:   '#2e3250',
            accent:   '#7c83fd',
            conflict: '#f87171',
            pending:  '#fbbf24',
            muted:    '#9ca3af',
          }
        }
      }
    };
  </script>

  <!-- FullCalendar -->
  <link   href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    body { background-color: #1e2030; color: #e2e8f0; font-family: 'Inter', sans-serif; }

    /* ── Sidebar widths ─────────────────────────────────────────── */
    #sidebar { width: 17rem; min-width: 17rem; }

    /* ── Calendar ───────────────────────────────────────────────── */
    #calendar-wrap { background: #252839; border-radius: 0.75rem; padding: 1rem; }

    .fc { --fc-border-color: #2e3250; --fc-page-bg-color: transparent;
          --fc-neutral-bg-color: #1e2030; --fc-neutral-text-color: #9ca3af;
          --fc-today-bg-color: rgba(124,131,253,.10);
          --fc-event-border-color: transparent; }

    .fc-col-header-cell-cushion,
    .fc-timegrid-slot-label-cushion,
    .fc-daygrid-day-number { color: #9ca3af; font-size: 0.75rem; text-decoration: none; }

    .fc-col-header-cell { background: #1e2030; border-color: #2e3250 !important; }
    .fc-timegrid-slot   { border-color: #2e3250 !important; }
    .fc-scrollgrid      { border-color: #2e3250 !important; }
    .fc-scrollgrid-sync-table td,
    .fc-scrollgrid-sync-table th { border-color: #2e3250 !important; }
    .fc-timegrid-col    { border-color: #2e3250 !important; }

    .fc .fc-button { background: #2e3250 !important; border: 1px solid #3d4270 !important;
                     color: #9ca3af !important; border-radius: 0.5rem !important; font-size: 0.8rem !important; }
    .fc .fc-button:hover  { background: #3d4270 !important; color: #e2e8f0 !important; }
    .fc .fc-button-active { background: #7c83fd !important; color: #fff !important; border-color: #7c83fd !important; }
    .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 600 !important; color: #e2e8f0 !important; }

    .fc-event { border-radius: 6px !important; font-size: 0.78rem !important;
                font-weight: 500 !important; padding: 2px 6px !important; cursor: pointer; }
    .fc-event .fc-event-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Success (validated by C++ engine) – green */
    .fc-event.success   { background: #34d399 !important; color: #064e3b !important; }

    /* Conflict (rejected by C++ engine) – red */
    .fc-event.conflict { background: #f87171 !important; color: #fff !important; }

    /* Pending (not yet validated) – dashed amber tint */
    .fc-event.pending {
      background: rgba(251,191,36,0.18) !important;
      border: 2px dashed #fbbf24 !important;
      color: #fde68a !important;
    }

    /* ── Now Indicator ──────────────────────────────────────────── */
    .fc-timegrid-now-indicator-container { pointer-events: none !important; cursor: default !important; }
    .fc-timegrid-now-indicator-arrow {
      border-color: rgba(124,131,253,.85) !important;
      border-top-color: transparent !important;
      border-bottom-color: transparent !important;
      pointer-events: none !important;
    }
    .fc-timegrid-now-indicator-line {
      border-color: rgba(124,131,253,.55) !important;
      border-top-width: 2px !important;
      pointer-events: auto !important;
      cursor: pointer !important;
      position: relative; overflow: visible;
      z-index: 9 !important;
    }
    .fc-timegrid-now-indicator-line:hover::after {
      content: "Current Time";
      position: absolute; top: -25px; left: 10px;
      background: #475569; color: #fff;
      padding: 4px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 500; white-space: nowrap;
      pointer-events: none; box-shadow: 0 2px 4px rgba(0,0,0,.35); z-index: 100;
    }

    /* ── Tooltip ────────────────────────────────────────────────── */
    #tooltip { pointer-events: none; transition: opacity .15s ease; }

    /* ── Form inputs ────────────────────────────────────────────── */
    .form-input {
      width: 100%; background: #161726;
      border: 1px solid #2e3250; border-radius: 0.5rem;
      color: #e2e8f0; padding: 0.42rem 0.6rem;
      font-size: 0.78rem; outline: none;
      transition: border-color 0.15s;
      appearance: none; -webkit-appearance: none;
    }
    .form-input:focus { border-color: #7c83fd; }
    .form-input option { background: #161726; }
    .form-label {
      display: block; font-size: 0.65rem; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.25rem;
    }

    /* ── Sidebar section headings ───────────────────────────────── */
    .section-head {
      font-size: 0.65rem; color: #9ca3af;
      text-transform: uppercase; letter-spacing: 0.09em;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2e3250;
      margin-bottom: 0.75rem;
    }

    /* ── Stat card ──────────────────────────────────────────────── */
    .stat-card { background: #161726; border-radius: 0.5rem; padding: 0.6rem 0.75rem; }
    .stat-val  { font-size: 1.4rem; font-weight: 700; line-height: 1.2; margin-top: 0.1rem; }

    /* ── Add-event button pulse on success ──────────────────────── */
    @keyframes pulse-green {
      0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
      50%      { box-shadow: 0 0 0 6px rgba(52,211,153,.35); }
    }
    .pulse-ok { animation: pulse-green 0.6s ease; }

    /* Shake on error */
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)}
    }
    .shake { animation: shake 0.35s ease; }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #1e2030; }
    ::-webkit-scrollbar-thumb { background: #3d4270; border-radius: 3px; }
  </style>
</head>

<body class="dark h-full">

  <aside id="sidebar"

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7c83fd" stroke-width="2.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>

       MAIN
  ═════════════════════════════════════════════════════════════ -->

<!-- ── Script ───────────────────────────────────────────────────── -->
<script>
// ═══════════════════════════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════════════════════════
const MINS_PER_DAY = 1440;
const MINS_PER_WEEK = MINS_PER_DAY * 7;
const DAY_NAMES  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_COLORS = ['#7c83fd','#22d3ee','#a78bfa','#34d399','#fb923c','#f472b6','#60a5fa'];
const LS_KEY_CONFIRMED = 'rbt_confirmed_events'; // validated / synced from C++
const LS_KEY_PENDING   = 'rbt_pending_events';   // added via UI, not yet validated

// ═══════════════════════════════════════════════════════════════════
// Time helpers
// ═══════════════════════════════════════════════════════════════════
function weekMinutesToDate(mins, monday) {
  const d = new Date(monday);
  d.setDate(d.getDate() + Math.floor(mins / MINS_PER_DAY));
  d.setHours(0, 0, 0, 0);
  d.setMinutes(mins % MINS_PER_DAY);
  return d;
}

function getMondayOfWeek(now) {
  const d = new Date(now);
  d.setHours(0, 0, 0, 0);
  const dow = d.getDay();
  d.setDate(d.getDate() + (dow === 0 ? -6 : 1 - dow));
  return d;
}

function fmtDuration(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? (m > 0 ? `${h}h ${m}m` : `${h}h`) : `${m}m`;
}

function fmtTime(timeStr) {
  // "09:05" → "09:05" (already HH:MM, keep leading zeros)
  return timeStr;
}

function timeStrToWeekMins(dayIdx, timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return dayIdx * MINS_PER_DAY + h * 60 + m;
}

// ═══════════════════════════════════════════════════════════════════
// State
//   confirmedRaw  – loaded from C++ data.json (validated by engine)
//   pendingRaw    – added via sidebar form (not yet validated by C++)
// ═══════════════════════════════════════════════════════════════════
let confirmedRaw = loadConfirmedFromStorage();
let pendingRaw   = loadPendingFromStorage();

function allRaw()    { return [...confirmedRaw, ...pendingRaw]; }
function pendingIds(){ return new Set(pendingRaw.map(e => e.id)); }

function loadConfirmedFromStorage() {
  try { return JSON.parse(localStorage.getItem(LS_KEY_CONFIRMED) || '[]'); }
  catch { return []; }
}
function saveConfirmedToStorage() {
  localStorage.setItem(LS_KEY_CONFIRMED, JSON.stringify(confirmedRaw));
}

function loadPendingFromStorage() {
  try { return JSON.parse(localStorage.getItem(LS_KEY_PENDING) || '[]'); }
  catch { return []; }
}
function savePendingToStorage() {
  localStorage.setItem(LS_KEY_PENDING, JSON.stringify(pendingRaw));
}

// ═══════════════════════════════════════════════════════════════════
// Conflict detection  (half-open intervals: [start, end))
// ═══════════════════════════════════════════════════════════════════
function detectConflicts(events) {
  const ids = new Set();
  for (let i = 0; i < events.length; i++)
    for (let j = i + 1; j < events.length; j++) {
      const a = events[i], b = events[j];
      if (a.startTime < b.endTime && b.startTime < a.endTime) {
        ids.add(a.id); ids.add(b.id);
      }
    }
  return ids;
}

// ═══════════════════════════════════════════════════════════════════
// Build a FullCalendar event object
// Colour is driven by the explicit `status` field written by the C++ engine.
//   success  → solid green  (#34d399)  — C++ confirmed, no conflict
//   conflict → solid red    (#f87171)  — C++ detected overlap
//   pending  → dashed amber (rgba tint) — not yet audited
//   (no status) → day-palette colour (legacy / sample data)
// ═══════════════════════════════════════════════════════════════════
function buildFCEvent(ev, monday) {
  const dayIdx = Math.floor(ev.startTime / MINS_PER_DAY);
  const status = ev.status || (ev.isPending ? 'pending' : 'success');

  let bgColor, borderColor, textColor, classNames;
  switch (status) {
    case 'success':
      bgColor = '#34d399'; borderColor = '#34d399'; textColor = '#064e3b';
      classNames = ['success'];
      break;
    case 'conflict':
      bgColor = '#f87171'; borderColor = '#f87171'; textColor = '#fff';
      classNames = ['conflict'];
      break;
    case 'pending':
      bgColor = 'rgba(251,191,36,0.15)'; borderColor = '#fbbf24'; textColor = '#fde68a';
      classNames = ['pending'];
      break;
    default:
      bgColor = DAY_COLORS[dayIdx % DAY_COLORS.length];
      borderColor = bgColor; textColor = '#fff';
      classNames = [];
  }

  const prefix = status === 'pending'  ? '◎ '
               : status === 'conflict' ? '⚠ '
               : '';

  return {
    id:              String(ev.id),
    title:           prefix + ev.title,
    start:           weekMinutesToDate(ev.startTime, monday),
    end:             weekMinutesToDate(ev.endTime,   monday),
    backgroundColor: bgColor,
    borderColor,
    textColor,
    classNames,
    extendedProps: {
      rawTitle:     ev.title,
      startLabel:   ev.startLabel  || '',
      endLabel:     ev.endLabel    || '',
      durationMin:  ev.endTime - ev.startTime,
      status,
      conflictWith: ev.conflictWith || null,
    },
  };
}

// ═══════════════════════════════════════════════════════════════════
// Statistics  (driven purely by the status field on each event)
// ═══════════════════════════════════════════════════════════════════
function updateStats(events) {
  const pending   = events.filter(e => (e.status || (e.isPending ? 'pending' : 'success')) === 'pending').length;
  const conflicts = events.filter(e => (e.status || '') === 'conflict').length;
  const confirmed = events.filter(e => (e.status || (e.isPending ? 'pending' : 'success')) === 'success').length;

  document.getElementById('stat-total').textContent     = events.length;
  document.getElementById('stat-pending').textContent   = pending;
  document.getElementById('stat-conflicts').textContent = conflicts;

  const totalMins = events.reduce((s, e) => s + Math.max(0, e.endTime - e.startTime), 0);
  document.getElementById('stat-busy').textContent =
    events.length ? fmtDuration(totalMins) : '0h 0m';

  const dayMins = Array(7).fill(0);
  events.forEach(e => {
    const d = Math.floor(e.startTime / MINS_PER_DAY);
    if (d >= 0 && d < 7) dayMins[d] += Math.max(0, e.endTime - e.startTime);
  });
  const maxMins = Math.max(...dayMins);
  document.getElementById('stat-day').textContent =
    events.length && maxMins > 0 ? DAY_NAMES[dayMins.indexOf(maxMins)] : '—';

  // Header pending badge
  const badge = document.getElementById('pending-badge');
  document.getElementById('pending-badge-count').textContent = pending;
  badge.classList.toggle('hidden', pending === 0);
  badge.classList.toggle('flex',   pending > 0);
}

// ═══════════════════════════════════════════════════════════════════
// Sidebar event list
// ═══════════════════════════════════════════════════════════════════
function updateEventList(events) {
  const ul = document.getElementById('event-list');

  if (!events.length) {
    ul.innerHTML = '<li class="italic text-muted text-xs">No events yet.</li>';
    return;
  }

  ul.innerHTML = events.map(ev => {
    const status   = ev.status || (ev.isPending ? 'pending' : 'success');
    const dayIdx   = Math.floor(ev.startTime / MINS_PER_DAY);
    const isPending  = status === 'pending';
    const isConflict = status === 'conflict';
    const isSuccess  = status === 'success';

    const dotStyle = isConflict ? 'background:#f87171'
                   : isPending  ? 'background:#fbbf24'
                   : isSuccess  ? 'background:#34d399'
                   : `background:${DAY_COLORS[dayIdx % 7]}`;

    const badge = isConflict
      ? `<span class="ml-1 shrink-0 text-red-400 font-bold text-xs leading-none">⚠</span>`
      : isPending
        ? `<span class="ml-1 shrink-0 text-amber-400 text-xs font-medium rounded
                        px-1 border border-amber-400/30 bg-amber-400/10 leading-none py-0.5">pending</span>`
        : isSuccess
          ? `<span class="ml-1 shrink-0 text-emerald-400 text-xs leading-none">✓</span>`
          : '';

    // Conflict sub-label: who it clashes with
    const conflictSub = isConflict && ev.conflictWith
      ? `<span class="text-red-400/70 text-xs truncate block pl-3.5 leading-none pb-0.5">
           clashes with: ${ev.conflictWith.title}
         </span>`
      : '';

    const delBtn = isPending
      ? `<button class="ml-1 shrink-0 text-muted hover:text-red-400 transition-colors
                        text-base leading-none" data-del="${ev.id}" title="Discard">×</button>`
      : '';

    return `<li class="py-1.5 border-b border-border last:border-0 min-w-0">
              <div class="flex items-center gap-1.5 min-w-0">
                <span class="inline-block w-2 h-2 rounded-full shrink-0" style="${dotStyle}"></span>
                <span class="truncate text-white text-xs">${ev.title}</span>
                ${badge}
                <span class="ml-auto shrink-0 text-muted text-xs pl-1">
                  ${fmtDuration(ev.endTime - ev.startTime)}
                </span>
                ${delBtn}
              </div>
              ${conflictSub}
            </li>`;
  }).join('');

  ul.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => discardPending(Number(btn.dataset.del)));
  });
}

// ═══════════════════════════════════════════════════════════════════
// Full re-render
// ═══════════════════════════════════════════════════════════════════
function refreshCalendar() {
  const all = allRaw();
  calendar.removeAllEvents();
  all.forEach(ev => calendar.addEvent(buildFCEvent(ev, currentMonday)));
  updateStats(all);
  updateEventList(all);
}

// ═══════════════════════════════════════════════════════════════════
// Tooltip
// ═══════════════════════════════════════════════════════════════════
const tooltip   = document.getElementById('tooltip');
const ttTitle   = document.getElementById('tt-title');
const ttStart   = document.getElementById('tt-start');
const ttEnd     = document.getElementById('tt-end');
const ttDur     = document.getElementById('tt-dur');
const ttBadge   = document.getElementById('tt-badge');
const ttPending = document.getElementById('tt-pending');

document.addEventListener('mousemove', e => {
  if (!tooltip.classList.contains('hidden')) {
    const off = 14;
    let left = e.clientX + off, top = e.clientY + off;
    if (left + 240 > window.innerWidth)  left = e.clientX - 240 - off;
    if (top  + 140 > window.innerHeight) top  = e.clientY - 140 - off;
    tooltip.style.left = left + 'px';
    tooltip.style.top  = top  + 'px';
  }
});

function showTooltip(info) {
  const ep = info.event.extendedProps;
  ttTitle.textContent = ep.rawTitle || info.event.title;
  ttStart.textContent = `Start: ${ep.startLabel || info.event.startStr}`;
  ttEnd.textContent   = `End:   ${ep.endLabel   || info.event.endStr}`;
  ttDur.textContent   = `Duration: ${fmtDuration(ep.durationMin)}`;

  const isConflict = ep.status === 'conflict';
  const isPending  = ep.status === 'pending';

  if (isConflict && ep.conflictWith) {
    ttBadge.textContent = `⚠ Conflict with: ${ep.conflictWith.title}`;
  } else {
    ttBadge.textContent = '⚠ Conflict detected';
  }
  ttBadge.classList.toggle('hidden',   !isConflict);
  ttPending.classList.toggle('hidden', !isPending);
  tooltip.classList.remove('hidden');
}
function hideTooltip() { tooltip.classList.add('hidden'); }

// ═══════════════════════════════════════════════════════════════════
// FullCalendar init
// ═══════════════════════════════════════════════════════════════════
let calendar;
let currentMonday = getMondayOfWeek(new Date());

function initCalendar() {
  calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
    initialView:     'timeGridWeek',
    firstDay:        1,
    headerToolbar:   { left: 'prev,next', center: 'title', right: 'timeGridWeek,timeGridDay' },
    height:          '100%',
    allDaySlot:      false,
    slotMinTime:     '07:00:00',
    slotMaxTime:     '23:00:00',
    slotDuration:    '00:30:00',
    expandRows:      true,
    nowIndicator:    true,
    initialDate:     currentMonday,
    eventMouseEnter: showTooltip,
    eventMouseLeave: hideTooltip,
    datesSet: info => {
      const label = info.start.toLocaleDateString('en-GB',
        { day:'numeric', month:'short', year:'numeric' });
      document.getElementById('week-label').textContent = 'Week of ' + label;
      currentMonday = getMondayOfWeek(info.start);
      refreshCalendar();
    },
  });
  calendar.render();
}

// ═══════════════════════════════════════════════════════════════════
// Status bar helper
// ═══════════════════════════════════════════════════════════════════
function setSyncStatus(msg, ok = true) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.style.color = ok ? '#34d399' : '#f87171';
}

// ═══════════════════════════════════════════════════════════════════
// Pipeline mode: detect whether we're running behind watch.js
// If window.location is http://localhost:3000 we use the automated
// POST /write-event + SSE path; otherwise fall back to the manual
// file-picker + export workflow (works when opened as file://).
// ═══════════════════════════════════════════════════════════════════
const PIPELINE_MODE = window.location.protocol === 'http:';

// ═══════════════════════════════════════════════════════════════════
// Ingest a full event array from the server (SSE or initial fetch)
// ═══════════════════════════════════════════════════════════════════
function ingestServerData(data) {
  if (!Array.isArray(data)) return;

  // All server data replaces the confirmed store; pending entries that
  // the C++ engine has now decided on are dropped from pendingRaw.
  const auditedIds = new Set(
    data.filter(ev => ev.status === 'success' || ev.status === 'conflict')
        .map(ev => ev.id)
  );
  confirmedRaw = data;
  saveConfirmedToStorage();
  pendingRaw = pendingRaw.filter(ev => !auditedIds.has(ev.id));
  savePendingToStorage();
  refreshCalendar();
}

// ═══════════════════════════════════════════════════════════════════
// Server-Sent Events  (pipeline mode only)
// ═══════════════════════════════════════════════════════════════════
let sseConnected = false;

function connectSSE() {
  if (!PIPELINE_MODE) return;
  const es = new EventSource('/events');

  es.onopen = () => {
    sseConnected = true;
    setSyncStatus('⬤ Live — C++ engine connected.');
  };

  es.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      ingestServerData(data);

      const nSuccess  = data.filter(ev => ev.status === 'success').length;
      const nConflict = data.filter(ev => ev.status === 'conflict').length;
      const nPending  = data.filter(ev => ev.status === 'pending').length;
      setSyncStatus(
        `⬤ Engine updated — ${nSuccess} ok, ${nConflict} conflict(s)` +
        (nPending ? `, ${nPending} pending` : '') + '.'
      );
    } catch (_) { /* ignore malformed push */ }
  };

  es.onerror = () => {
    sseConnected = false;
    setSyncStatus('○ Server offline — manual mode active.', false);
    // Retry handled automatically by EventSource; no manual reconnect needed.
  };
}

// ═══════════════════════════════════════════════════════════════════
// Manual sync / export  (fallback when not in pipeline mode)
// ═══════════════════════════════════════════════════════════════════
document.getElementById('btn-sync').addEventListener('click', () => {
  if (PIPELINE_MODE) {
    // In pipeline mode, Sync fetches the latest data.json from the server
    fetch('/data.json')
      .then(r => r.json())
      .then(data => { ingestServerData(data); setSyncStatus('✓ Refreshed from server.'); })
      .catch(() => setSyncStatus('✗ Fetch failed.', false));
  } else {
    document.getElementById('file-input').click();
  }
});

document.getElementById('file-input').addEventListener('change', function () {
  if (!this.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Expected a JSON array.');
      ingestServerData(data);
      const nS = data.filter(ev => ev.status === 'success').length;
      const nC = data.filter(ev => ev.status === 'conflict').length;
      setSyncStatus(`✓ Synced: ${nS} ok, ${nC} conflict(s).`);
    } catch (err) {
      setSyncStatus('✗ Invalid JSON: ' + err.message, false);
    }
    this.value = '';
  };
  reader.onerror = () => setSyncStatus('✗ Failed to read file.', false);
  reader.readAsText(this.files[0]);
});

document.getElementById('btn-export').addEventListener('click', () => {
  const all = allRaw();
  if (!all.length) { setSyncStatus('Nothing to export.', false); return; }

  const payload = all.map(ev => ({
    id:         ev.id,
    title:      ev.title,
    startTime:  ev.startTime,
    endTime:    ev.endTime,
    startLabel: ev.startLabel || '',
    endLabel:   ev.endLabel   || '',
    status:     ev.status || (ev.isPending ? 'pending' : 'success'),
    ...(ev.conflictWith ? { conflictWith: ev.conflictWith } : {}),
  }));

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'),
    { href: url, download: 'data.json' });
  a.click();
  URL.revokeObjectURL(url);
  setSyncStatus(`✓ Exported ${payload.length} event(s).`);
});

// ═══════════════════════════════════════════════════════════════════
// Add-event form
// ═══════════════════════════════════════════════════════════════════
function nextPendingId() {
  const used = new Set(allRaw().map(e => e.id));
  let id = Date.now();
  while (used.has(id)) id++;
  return id;
}

const addForm   = document.getElementById('add-event-form');
const formError = document.getElementById('form-error');
const btnAdd    = document.getElementById('btn-add-event');

function showFormError(msg) {
  formError.textContent = msg;
  formError.classList.remove('hidden');
  addForm.classList.add('shake');
  addForm.addEventListener('animationend', () => addForm.classList.remove('shake'), { once: true });
}

addForm.addEventListener('submit', e => {
  e.preventDefault();
  formError.classList.add('hidden');

  const title    = document.getElementById('f-title').value.trim();
  const dayIdx   = parseInt(document.getElementById('f-day').value, 10);
  const startStr = document.getElementById('f-start').value;
  const endStr   = document.getElementById('f-end').value;

  if (!title)               { showFormError('Title is required.'); return; }
  if (!startStr || !endStr) { showFormError('Fill in both times.'); return; }

  const startMins = timeStrToWeekMins(dayIdx, startStr);
  const endMins   = timeStrToWeekMins(dayIdx, endStr);

  if (endMins <= startMins)    { showFormError('End must be after start.'); return; }
  if (endMins > MINS_PER_WEEK) { showFormError('End time exceeds the week boundary.'); return; }

  const dayName  = DAY_NAMES[dayIdx];
  const newEvent = {
    id:         nextPendingId(),
    title,
    startTime:  startMins,
    endTime:    endMins,
    startLabel: `${dayName} ${startStr}`,
    endLabel:   `${dayName} ${endStr}`,
    status:     'pending',
  };

  // ── Pipeline mode: POST to server → SSE will carry the result back ──
  if (PIPELINE_MODE) {
    // Optimistic render: show it as pending immediately
    pendingRaw.push({ ...newEvent, isPending: true });
    savePendingToStorage();
    refreshCalendar();

    fetch('/write-event', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(newEvent),
    })
      .then(r => r.json())
      .then(res => {
        if (!res.ok) {
          setSyncStatus(`✗ Server error: ${res.error}`, false);
        } else {
          setSyncStatus(`◎ "${title}" sent to engine…`);
        }
      })
      .catch(() => setSyncStatus('✗ Server unreachable.', false));

  // ── Manual mode: local-only pending ──────────────────────────────
  } else {
    pendingRaw.push({ ...newEvent, isPending: true });
    savePendingToStorage();
    refreshCalendar();
    setSyncStatus(`◎ "${title}" added — export to run C++ audit.`);
  }

  // Visual success feedback and form reset
  btnAdd.classList.add('pulse-ok');
  btnAdd.addEventListener('animationend', () => btnAdd.classList.remove('pulse-ok'), { once: true });
  document.getElementById('f-title').value = '';
  document.getElementById('f-title').focus();
});

// ═══════════════════════════════════════════════════════════════════
// Discard a pending event
// ═══════════════════════════════════════════════════════════════════
function discardPending(id) {
  pendingRaw = pendingRaw.filter(e => e.id !== id);
  savePendingToStorage();
  refreshCalendar();
}

// Init
// ═══════════════════════════════════════════════════════════════════
initCalendar();

// Restore state from localStorage then connect to live engine
if (confirmedRaw.length || pendingRaw.length) refreshCalendar();

// In pipeline mode: fetch the current data.json from the server on load,
// then open the SSE stream for live updates.
if (PIPELINE_MODE) {
  fetch('/data.json')
    .then(r => r.json())
    .then(data => { ingestServerData(data); })
    .catch(() => { /* server not ready yet, SSE will handle it */ });

  connectSSE();
}
